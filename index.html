<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розрахунок магістралі | Ваш П’єх Сервіс</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            /* Легкий паттерн на фоні */
            background-image: radial-gradient(#dee2e6 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .company-header {
            color: #1a73e8;
            font-size: clamp(24px, 5vw, 34px);
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px; /* Збільшений відступ, бо тепер немає фото */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #calculator {
            background-color: #ffffff;
            padding: clamp(25px, 5vw, 40px);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 480px;
            border-top: 10px solid #1a73e8;
            box-sizing: border-box;
        }

        h2 {
            color: #202124;
            margin-top: 0;
            font-size: 18px;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
            color: #3c4043;
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 13px;
            margin-bottom: 20px;
            border: 1px solid #dadce0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a73e8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 14px;
            cursor: pointer;
        }

        input:focus, select:focus {
            border-color: #1a73e8;
        }

        #result {
            text-align: center;
            color: #1a73e8;
            background: #f1f3f4;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 800;
            border: 1px solid #e8eaed;
        }

        .btn-viber {
            width: 100%;
            padding: 18px;
            background-color: #7360f2;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-viber:hover {
            background-color: #5e4ecf;
        }

        .info-text {
            font-size: 11px;
            color: #70757a;
            margin-top: -16px;
            margin-bottom: 16px;
            padding-left: 5px;
        }

        .price-note {
            font-size: 13px;
            color: #1a73e8;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
            background: #e8f0fe;
            padding: 8px;
            border-radius: 8px;
        }
        
        hr {
            border: 0;
            border-top: 1px solid #f1f3f4;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="company-header">Ваш П’єх Сервіс</div>

<div id="calculator">
    <h2>Розрахунок вартості</h2>
    <div class="subtitle">Матеріали <b>Halcor</b> (Греція)</div>

    <div class="price-note">Монтаж фреономагістралі (робота): 2200 грн</div>

    <label>Площа приміщення:</label>
    <select id="lineType" oninput="calculate()">
        <option value="750">До 25-35 м² — 750 грн/м</option>
        <option value="1000">До 40-55 м² — 1000 грн/м</option>
        <option value="1100">До 70-90 м² — 1100 грн/м</option>
    </select>

    <label>Довжина магістралі (метрів):</label>
    <input type="number" id="meters" value="3" min="3" oninput="calculate()">
    <div class="info-text">Мінімальна довжина — 3 метри</div>

    <hr>

    <label>Штроблення під магістраль (м):</label>
    <input type="number" id="wallMeters" value="0" min="0" oninput="calculate()">
    <div class="info-text">Ціна — 200 грн/метр</div>

    <label>Штроблення під дренаж (м):</label>
    <input type="number" id="drainageMeters" value="0" min="0" oninput="calculate()">
    <div class="info-text">Ціна — 300 грн/метр</div>

    <label>Сифон для дренажу:</label>
    <select id="siphon" oninput="calculate()">
        <option value="0">Не потрібен</option>
        <option value="1600">Тільки сифон — 1600 грн</option>
        <option value="2300">Сифон з монтажем — 2300 грн</option>
    </select>

    <div id="result">Завантаження...</div>

    <a href="#" id="viberLink" target="_blank" class="btn-viber">Замовити у Viber</a>
</div>

<script>
    function calculate() {
        const baseWork = 2200; 
        const lineSelect = document.getElementById('lineType');
        const pricePerM = Number(lineSelect.value);
        const areaText = lineSelect.options[lineSelect.selectedIndex].text.split(' —')[0];
        
        let mInput = document.getElementById('meters');
        let mVal = Number(mInput.value);
        let finalM = mVal < 3 ? 3 : mVal;

        const wM = Number(document.getElementById('wallMeters').value);
        const dM = Number(document.getElementById('drainageMeters').value);
        const sPrice = Number(document.getElementById('siphon').value);
        const sText = document.getElementById('siphon').options[document.getElementById('siphon').selectedIndex].text;

        let total = baseWork + (pricePerM * finalM) + (wM * 200) + (dM * 300) + sPrice;
        
        const resDiv = document.getElementById('result');
        if (total < 2500) {
            resDiv.innerHTML = `Вартість: ${total} грн<br><span style="font-size:12px; color:#d93025; font-weight:400;">Мінімальний виїзд — 2500 грн</span>`;
        } else {
            resDiv.innerText = `Вартість: ${total} грн`;
            resDiv.style.color = "#1a73e8";
        }

        const msg = `Ваш П'єх Сервіс - Замовлення:\n` +
                    `- Об'єкт: ${areaText}\n` +
                    `- Магістраль: ${finalM} м\n` +
                    `- Штроба магістралі: ${wM} м\n` +
                    `- Штроба дренажу: ${dM} м\n` +
                    `- Сифон: ${sText}\n` +
                    `РАЗОМ: ${total < 2500 ? 2500 : total} грн`;
        
        document.getElementById('viberLink').href = `viber://chat?number=%2B380632080811&draft=${encodeURIComponent(msg)}`;
    }
    window.onload = calculate;
</script>

</body>
</html>
