<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кошторис</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f2f2f7; margin: 0; padding: 8px; color: #1c1c1e; }
        #receipt-content { background: #f2f2f7; padding: 6px; border-radius: 8px; }
        
        /* Зменшені контейнери та відступи */
        .container { background: #fff; border-radius: 8px; padding: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 10px; }
        h2 { font-size: 13px; color: #fff; background: #007aff; padding: 8px 10px; border-radius: 6px; margin: 0 0 10px 0; letter-spacing: 0.2px; }
        
        /* Шапка таблиці */
        .table-header { display: flex; gap: 4px; padding-bottom: 6px; border-bottom: 1px solid #e5e5ea; margin-bottom: 6px; font-size: 10px; font-weight: 600; color: #8e8e93; text-align: center; align-items: center; text-transform: uppercase; }
        .th-name { flex: 1; text-align: left; }
        .th-price { width: 55px; }
        .th-qty { width: 40px; }
        .th-total { width: 60px; text-align: right; }
        
        /* Компактні рядки */
        .item { display: flex; align-items: center; gap: 4px; padding: 5px 0; border-bottom: 1px solid #f2f2f7; }
        .item:last-child { border-bottom: none; padding-bottom: 0; }
        
        /* Зменшений шрифт назв */
        .name { flex: 1; font-weight: 500; font-size: 12px; line-height: 1.2; word-break: break-word; margin: 0; padding-right: 4px;}
        
        /* Поля вводу */
        input[type="number"] { padding: 4px 1px; border: 1px solid #d1d1d6; border-radius: 6px; font-size: 14px; font-weight: 500; text-align: center; background: #f2f2f7; box-sizing: border-box; color: #000; margin: 0;}
        input:focus { outline: 1px solid #007aff; background: #fff; border-color: transparent;}
        .price-input { width: 55px; }
        .qty-input { width: 40px; }
        input::placeholder { color: #c7c7cc; }
        
        /* Суми */
        .item-total { width: 60px; font-weight: 600; font-size: 12px; text-align: right; white-space: nowrap; }
        .stage-total { text-align: right; font-size: 13px; font-weight: 700; color: #007aff; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #c7c7cc; }
        .grand-total { font-size: 15px; font-weight: bold; text-align: center; background: #34c759; color: white; padding: 12px; border-radius: 8px; margin-top: 10px; box-shadow: 0 2px 8px rgba(52,199,89,0.2); position: sticky; bottom: 10px; z-index: 100;}
        
        /* Компактні кнопки */
        .actions { display: flex; gap: 6px; margin-bottom: 20px; padding: 0 4px; margin-top: 10px;}
        .btn { flex: 1; padding: 8px 4px; border: none; border-radius: 8px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .btn:active { opacity: 0.8; transform: scale(0.96); }
        .btn-icon { font-size: 16px; }
        .btn-text { font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .btn-blue { background: #007aff; }
        .btn-green { background: #34c759; }
        .btn-red { background: #ff3b30; }

        /* Альбомна орієнтація */
        @media (orientation: landscape) {
            body { padding: 4px 10px; }
            .container { padding: 6px 10px; margin-bottom: 8px;}
            h2 { padding: 6px 8px; margin-bottom: 6px; font-size: 12px;}
            .item { padding: 4px 0; }
            .grand-total { padding: 8px; font-size: 14px; bottom: 4px; margin-top: 8px;}
            .actions { margin-bottom: 15px; gap: 10px;}
            .btn { flex-direction: row; padding: 6px; gap: 6px;}
            .btn-icon { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="receipt-content"></div>

<div class="actions">
    <button class="btn btn-blue" onclick="exportToImage()">
        <div class="btn-icon" id="icon-save">📸</div>
        <div class="btn-text" id="text-save">Зберегти</div>
    </button>
    <button class="btn btn-green" onclick="shareImage()">
        <div class="btn-icon" id="icon-share">📤</div>
        <div class="btn-text" id="text-share">Надіслати</div>
    </button>
    <button class="btn btn-red" onclick="clearAll()">
        <div class="btn-icon">🗑</div>
        <div class="btn-text">Очистити</div>
    </button>
</div>

<script>
    const data = [
        {
            stage: "1 Етап монтажних робіт",
            items: [
                { name: "Монтаж фреонової магістралі", price: 2200, qty: 0 },
                { name: "Фреонова магістраль 1/4 і 3/8", price: 750, qty: 0 },
                { name: "Фреонова магістраль 1/4 і 1/2", price: 950, qty: 0 },
                { name: "Фреонова магістраль 1/4 і 5/8 (3/8 і 5/8)", price: 1100, qty: 0 },
                { name: "Сифон HL138", price: 1600, qty: 0 },
                { name: "Монтаж Сифона з розхідниками", price: 700, qty: 0 },
                { name: "Штроба до 5 см.", price: 200, qty: 0 },
                { name: "Прокладання дренажної труби ПВХ", price: 100, qty: 0 },
                { name: "Алмазне буріння отвору 52мм", price: 200, qty: 0 },
                { name: "Кабель 3х2,5 та його прокладання", price: 80, qty: 0 }
            ]
        },
        {
            stage: "2 Етап монтажних робіт",
            items: [
                { name: "Монтаж внутр. блоку [7.9.12]", price: 1500, qty: 0 },
                { name: "Монтаж внутр. блоку [18.24]", price: 2000, qty: 0 },
                { name: "Монтаж зовн. блоку [7.9.12]", price: 2000, qty: 0 },
                { name: "Монтаж зовн. блоку [18.24]", price: 2500, qty: 0 },
                { name: "Монтаж корзини", price: 1300, qty: 0 },
                { name: "Послуги альпініста", price: 3000, qty: 0 }
            ]
        }
    ];

    function render() {
        let html = '';
        let grandTotal = 0;
        data.forEach((stage, sIndex) => {
            let stageTotal = 0;
            html += `<div class="container"><h2>${stage.stage}</h2><div class="table-header"><div class="th-name">Робота</div><div class="th-price">Ціна</div><div class="th-qty">К-сть</div><div class="th-total">Сума</div></div>`;
            stage.items.forEach((item, iIndex) => {
                let total = item.price * item.qty;
                stageTotal += total;
                let displayQty = item.qty === 0 ? '' : item.qty;
                html += `<div class="item"><div class="name">${item.name}</div><input type="number" class="price-input" inputmode="numeric" value="${item.price}" onchange="updatePrice(${sIndex}, ${iIndex}, this.value)"><input type="number" class="qty-input" inputmode="numeric" placeholder="0" value="${displayQty}" onchange="updateQty(${sIndex}, ${iIndex}, this.value)"><div class="item-total">${total}</div></div>`;
            });
            grandTotal += stageTotal;
            html += `<div class="stage-total">Разом: ${stageTotal} ₴</div></div>`;
        });
        html += `<div class="grand-total">Всього до оплати: ${grandTotal} ₴</div>`;
        document.getElementById('receipt-content').innerHTML = html;
    }

    function updateQty(sIndex, iIndex, value) { data[sIndex].items[iIndex].qty = Number(value) || 0; render(); }
    function updatePrice(sIndex, iIndex, value) { data[sIndex].items[iIndex].price = Number(value) || 0; render(); }
    function clearAll() { if(confirm('Очистити всі поля для нового прорахунку?')) { data.forEach(s => s.items.forEach(i => i.qty = 0)); render(); window.scrollTo(0,0); } }

    function exportToImage() {
        const icon = document.getElementById('icon-save');
        const text = document.getElementById('text-save');
        icon.innerHTML = '⏳'; text.innerHTML = '...';
        html2canvas(document.getElementById('receipt-content'), { scale: 2, backgroundColor: "#f2f2f7" }).then(canvas => {
            let link = document.createElement('a');
            link.download = 'Кошторис_Монтаж.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            icon.innerHTML = '✅'; text.innerHTML = 'Готово';
            setTimeout(() => { icon.innerHTML = '📸'; text.innerHTML = 'Зберегти'; }, 2000);
        });
    }

    function shareImage() {
        const icon = document.getElementById('icon-share');
        const text = document.getElementById('text-share');
        icon.innerHTML = '⏳'; text.innerHTML = '...';
        html2canvas(document.getElementById('receipt-content'), { scale: 2, backgroundColor: "#f2f2f7" }).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], "Koshtorys.png", { type: "image/png" });
                if (navigator.share) {
                    navigator.share({ files: [file], title: 'Кошторис на монтаж' })
                    .then(() => { icon.innerHTML = '✅'; text.innerHTML = 'ОК'; })
                    .catch(() => { icon.innerHTML = '📤'; text.innerHTML = 'Надіслати'; })
                    .finally(() => { setTimeout(() => { icon.innerHTML = '📤'; text.innerHTML = 'Надіслати'; }, 2000); });
                } else { 
                    alert("Ця функція працює тільки на мобільних пристроях."); 
                    icon.innerHTML = '📤'; text.innerHTML = 'Надіслати';
                }
            });
        });
    }
    render();
</script>
</body>
</html>
